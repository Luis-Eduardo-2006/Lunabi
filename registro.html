<body data-page="registro">

  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
  </div>

  <div id="navbar-container"></div>

  <main id="main-content">
    <section class="auth-page">
      <div class="container">
        <div class="auth-card fade-up">
          <div class="auth-card-header">
            <a href="index.html" class="auth-card-logo" aria-label="Ir al inicio">
              <img src="img/logo/logo.webp" alt="Lünabi" height="52">
              <span class="auth-card-name">Lünabi</span>
            </a>
          </div>

          <div class="auth-intro">
            <h1>Crea tu cuenta</h1>
            <p>Únete a la comunidad Lünabi</p>
          </div>

          <!-- Cuando llegue el backend, sustituir action="#" por action="/api/registro"
               y cambiar wireSignupForm en auth.js por una llamada fetch(). -->
          <form class="auth-form active" id="signupForm" method="post" action="#" novalidate>
            <label class="auth-field">
              <span>Nombre</span>
              <input type="text" name="nombre" placeholder="Tu nombre" required autocomplete="name">
            </label>
            <label class="auth-field">
              <span>Correo electrónico</span>
              <input type="email" name="email" placeholder="tu@email.com" required autocomplete="email">
            </label>
            <label class="auth-field">
              <span>Contraseña</span>
              <input type="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
            </label>
            <label class="auth-field">
              <span>Confirmar contraseña</span>
              <input type="password" name="password_confirm" placeholder="Repite la contraseña" required minlength="6" autocomplete="new-password">
            </label>
            <div class="auth-error"></div>
            <button type="submit" class="btn-auth">
              <i class="bi bi-heart"></i> Crear mi cuenta
            </button>
            <p class="auth-footer">
              ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </p>
          </form>
        </div>
      </div>
    </section>
  </main>

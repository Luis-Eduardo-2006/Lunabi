  </div>

  <div id="navbar-container"></div>

  <main id="main-content">
    <section class="cuenta-page">
      <div class="container">

        <div class="cuenta-main" id="cuentaMain">

          <!-- HERO -->
          <div class="cuenta-hero fade-up">
            <div class="cuenta-hero-bg" aria-hidden="true"></div>
            <div class="cuenta-hero-inner">
              <div class="cuenta-avatar" id="cuentaAvatar">?</div>
              <div class="cuenta-hero-info">
                <span class="cuenta-kicker"><i class="bi bi-stars"></i> Mi cuenta Lünabi</span>
                <h1 class="cuenta-name" id="cuentaName">—</h1>
                <p class="cuenta-email" id="cuentaEmail">—</p>
                <div class="cuenta-meta">
                  <span class="cuenta-chip"><i class="bi bi-calendar3"></i> Miembro desde <strong id="cuentaSince">—</strong></span>
                  <span class="cuenta-chip cuenta-chip-accent"><i class="bi bi-heart-fill"></i> <span id="cuentaFavChip">0</span> favoritos</span>
                </div>
              </div>
              <div class="cuenta-level">
                <div class="cuenta-level-badge" id="cuentaLevelBadge">
                  <i class="bi bi-award-fill"></i>
                  <span id="cuentaLevelName">Bronce</span>
                </div>
                <div class="cuenta-level-track"><div class="cuenta-level-fill" id="cuentaLevelFill"></div></div>
                <span class="cuenta-level-hint" id="cuentaLevelHint">—</span>
              </div>
            </div>
          </div>

          <!-- STATS -->
          <div class="cuenta-stats fade-up">
            <div class="cuenta-stat c1">
              <div class="cuenta-stat-icon"><i class="bi bi-bag-check"></i></div>
              <div class="cuenta-stat-body">
                <span class="cuenta-stat-label">Pedidos</span>
                <span class="cuenta-stat-value" id="cuentaStatOrders">0</span>
              </div>
            </div>
            <div class="cuenta-stat c2">
              <div class="cuenta-stat-icon"><i class="bi bi-cash-coin"></i></div>
              <div class="cuenta-stat-body">
                <span class="cuenta-stat-label">Total gastado</span>
                <span class="cuenta-stat-value" id="cuentaStatSpent">S/ 0.00</span>
              </div>
            </div>
            <div class="cuenta-stat c3">
              <div class="cuenta-stat-icon"><i class="bi bi-heart-fill"></i></div>
              <div class="cuenta-stat-body">
                <span class="cuenta-stat-label">Favoritos</span>
                <span class="cuenta-stat-value" id="cuentaStatFavs">0</span>
              </div>
            </div>
            <div class="cuenta-stat c4">
              <div class="cuenta-stat-icon"><i class="bi bi-stars"></i></div>
              <div class="cuenta-stat-body">
                <span class="cuenta-stat-label">Mi rutina</span>
                <span class="cuenta-stat-value" id="cuentaStatRoutine">—</span>
              </div>
            </div>
          </div>

          <!-- TABS -->
          <nav class="cuenta-tabs fade-up" role="tablist">
            <button class="cuenta-tab active" data-cuenta-tab="pedidos" type="button" role="tab"><i class="bi bi-bag-check"></i><span>Pedidos</span></button>
            <button class="cuenta-tab" data-cuenta-tab="favoritos" type="button" role="tab"><i class="bi bi-heart-fill"></i><span>Favoritos</span></button>
            <button class="cuenta-tab" data-cuenta-tab="rutina" type="button" role="tab"><i class="bi bi-stars"></i><span>Mi rutina</span></button>
            <button class="cuenta-tab" data-cuenta-tab="perfil" type="button" role="tab"><i class="bi bi-person-circle"></i><span>Perfil</span></button>
          </nav>

          <!-- PANELS -->
          <section class="cuenta-panel active" data-cuenta-panel="pedidos" id="cuentaPanelPedidos"></section>
          <section class="cuenta-panel"        data-cuenta-panel="favoritos" id="cuentaPanelFavoritos"></section>
          <section class="cuenta-panel"        data-cuenta-panel="rutina" id="cuentaPanelRutina"></section>
          <section class="cuenta-panel"        data-cuenta-panel="perfil" id="cuentaPanelPerfil"></section>
        </div>
      </div>
    </section>
  </main>
